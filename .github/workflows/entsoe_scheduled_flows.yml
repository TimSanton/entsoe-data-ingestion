name: ENTSO-E Scheduled Flows update

on:
  workflow_dispatch: {}
  schedule:
    - cron: "00 14 * * *"   # daily refresher (after day-ahead published ~12:00 CET)
    - cron: "30 4 * * *"    # daily 3d backfill

jobs:
  refresher:
    if: github.event_name == 'schedule' && github.event.schedule == '00 14 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: entsoe-flows-refresher
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OS tzdata
        run: |
          sudo apt-get update
          sudo apt-get install -y tzdata

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir tzdata
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Patch entsoe-py timezone bug
        shell: bash
        run: |
          python - <<'PY'
          import site, pathlib

          for sp in site.getsitepackages():
              p = pathlib.Path(sp) / "entsoe" / "entsoe.py"
              if p.exists():
                  txt = p.read_text(encoding="utf-8")
                  if "europe/amsterdam" in txt:
                      p.write_text(
                          txt.replace("europe/amsterdam", "Europe/Amsterdam"),
                          encoding="utf-8"
                      )
                      print("Patched:", p)
                  else:
                      print("No patch needed:", p)
                  break
          else:
              raise SystemExit("entsoe/entsoe.py not found")
          PY

      - name: Verify timezone availability
        run: |
          python - <<'PY'
          import zoneinfo
          z = zoneinfo.ZoneInfo("Europe/Amsterdam")
          print("ZoneInfo loaded:", z)
          PY

      - name: Run scheduled flows script (refresher)
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          PG_SSLMODE: ${{ secrets.PG_SSLMODE }}
          ROLLING_WINDOW_DAYS: "3"
        run: |
          python import_scheduled_flows.py

  revision_backfill_3d:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: entsoe-flows-backfill-3d
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OS tzdata
        run: |
          sudo apt-get update
          sudo apt-get install -y tzdata

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir tzdata
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Patch entsoe-py timezone bug
        shell: bash
        run: |
          python - <<'PY'
          import site, pathlib

          for sp in site.getsitepackages():
              p = pathlib.Path(sp) / "entsoe" / "entsoe.py"
              if p.exists():
                  txt = p.read_text(encoding="utf-8")
                  if "europe/amsterdam" in txt:
                      p.write_text(
                          txt.replace("europe/amsterdam", "Europe/Amsterdam"),
                          encoding="utf-8"
                      )
                      print("Patched:", p)
                  else:
                      print("No patch needed:", p)
                  break
          else:
              raise SystemExit("entsoe/entsoe.py not found")
          PY

      - name: Verify timezone availability
        run: |
          python - <<'PY'
          import zoneinfo
          z = zoneinfo.ZoneInfo("Europe/Amsterdam")
          print("ZoneInfo loaded:", z)
          PY

      - name: Run scheduled flows script (3d backfill)
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          PG_SSLMODE: ${{ secrets.PG_SSLMODE }}
          ROLLING_WINDOW_DAYS: "3"
        run: |
          python import_scheduled_flows.py
